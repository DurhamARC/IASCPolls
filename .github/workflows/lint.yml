name: Lint
on:
  push:
    paths:
      - 'iasc/**'
      - 'frontend/**'
      - 'react-app/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'iasc/**'
      - 'frontend/**'
      - 'react-app/**'
      - '.github/workflows/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: psf/black@24.10.0
        with:
          options: "--check --verbose"
          src: "./iasc"

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - run: npm ci
        working-directory: ./react-app

      - name: Run ESLint on React App
        working-directory: ./react-app
        run: npx eslint --ext .js,.jsx .

      - name: Check against prettier rules
        working-directory: ./react-app
        run: npx prettier --check '**/*.{js,jsx,css,html}'
