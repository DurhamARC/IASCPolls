<svg xmlns="http://www.w3.org/2000/svg" viewBox="63.0 60.0 560.0 125.0" width="650" height="175">

  <!-- 1. Badge -->
  <rect x="178.03" y="68.46" width="443.06" height="106.96" rx="12" fill="#111111"/>

  <!-- 2. PE behind crosshairs -->
  <text x="447.32" y="162"
    font-family="'Arial Black','Arial Bold',Arial,sans-serif"
    font-weight="900" font-size="112" fill="#ffffff" letter-spacing="-2">PE</text>

  <!-- 3. Crosshair arms: black outline then white core -->
  <g stroke-linecap="round">
    <line x1="401.68" y1="93.02" x2="401.68" y2="63.02" stroke="#000" stroke-width="21"/>
    <line x1="401.68" y1="150.86" x2="401.68" y2="180.86" stroke="#000" stroke-width="21"/>
    <line x1="372.75" y1="121.94"   x2="342.75" y2="121.94"    stroke="#000" stroke-width="21"/>
    <line x1="430.6" y1="121.94"   x2="460.6" y2="121.94"    stroke="#000" stroke-width="21"/>
    <line x1="401.68" y1="93.02" x2="401.68" y2="63.02" stroke="#fff" stroke-width="5"/>
    <line x1="401.68" y1="150.86" x2="401.68" y2="180.86" stroke="#fff" stroke-width="5"/>
    <line x1="372.75" y1="121.94"   x2="342.75" y2="121.94"    stroke="#fff" stroke-width="5"/>
    <line x1="430.6" y1="121.94"   x2="460.6" y2="121.94"    stroke="#fff" stroke-width="5"/>
  </g>

  <!-- 4. SC over arms -->
  <text x="192.03" y="162"
    font-family="'Arial Black','Arial Bold',Arial,sans-serif"
    font-weight="900" font-size="112" fill="#ffffff" letter-spacing="-2">SC</text>

  <!-- 5. C outside badge -->
  <text x="58.91" y="162"
    font-family="'Arial Black','Arial Bold',Arial,sans-serif"
    font-weight="900" font-size="112" fill="#000000" letter-spacing="-2">C</text>

  <!-- 6. Ring -->
  <circle cx="401.68" cy="121.94" r="28.92" fill="#111111"/>
  <circle cx="401.68" cy="121.94" r="28.92" fill="none" stroke="#ffffff" stroke-width="9"/>

  <!-- 7. Dot -->
  <circle cx="401.68" cy="121.94" r="6" fill="#ffffff"/>

  <!-- 8. Hyphen topmost -->
  <line x1="152.53" y1="120.94" x2="180.53" y2="120.94"
    stroke="#000" stroke-width="26" stroke-linecap="round"/>
  <line x1="152.53" y1="120.94" x2="180.53" y2="120.94"
    stroke="#fff" stroke-width="10" stroke-linecap="round"/>

</svg>
